<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://ryancraighead.github.io/">
    <title>Ryan Craighead</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #111310;
            --ink: #f2ecdf;
            --muted: #bab1a2;
            --accent: #67d6a3;
            --line: rgba(242, 236, 223, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100svh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--ink);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(100%, 560px);
            padding: 32px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 8vw, 4rem);
            line-height: 1;
        }

        p {
            margin: 0 0 22px;
            color: var(--muted);
        }

        a {
            color: var(--accent);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>Ryan Craighead</h1>
        <p>Redirecting to the portfolio site.</p>
        <a href="https://ryancraighead.github.io/">Open ryancraighead.github.io</a>
    </main>
</body>
</html>
